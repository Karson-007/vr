<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.x/dist/aframe-environment-component.min.js"></script>
  <script>
    AFRAME.registerComponent('cloud', {
      schema: {
        color: {type: 'color', default: '#ffffff'},
        opacity: {type: 'number', default: 0.82}
      },
      init: function () {
        var data = this.data;
        var el = this.el;
        var puffs = [
          {x: 0,   y: 0,   z: 0,   r: 7},
          {x: 8,   y: -1,  z: 1,   r: 6},
          {x: -7,  y: -1,  z: 0.5, r: 5.5},
          {x: 4,   y: 2.5, z: -1,  r: 5},
          {x: -3,  y: 2,   z: 1,   r: 4},
          {x: 12,  y: -2,  z: 0,   r: 4},
          {x: -11, y: -2,  z: -1,  r: 3.5},
          {x: 16,  y: -3,  z: 0.5, r: 3},
          {x: -14, y: -3,  z: 1,   r: 2.8}
        ];
        puffs.forEach(function (p) {
          var sphere = document.createElement('a-sphere');
          sphere.setAttribute('position', p.x + ' ' + p.y + ' ' + p.z);
          sphere.setAttribute('radius', p.r);
          sphere.setAttribute('material',
            'shader:flat;color:' + data.color +
            ';opacity:' + data.opacity +
            ';transparent:true;side:double');
          el.appendChild(sphere);
        });
      }
    });
  </script>
</head>
<body>
  <a-scene renderer="logarithmicDepthBuffer: true; antialias: true">

    <a-entity environment="preset: starry; groundColor: #445; grid: none"></a-entity>
    <a-sphere position="0 20 -50" radius="5" material="shader:flat;color:#223344;opacity:0.7;transparent:true"></a-sphere>
    <a-sphere position="50 80 -100" radius="0.3" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:50 80 -100; to:-50 0 -100; dur:1500; loop:true; easing:easeInQuad; delay:0"></a-sphere>
<a-sphere position="70 80 -80" radius="0.2" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:70 80 -80; to:-30 0 -80; dur:1200; loop:true; easing:easeInQuad; delay:200"></a-sphere>
<a-sphere position="90 80 -120" radius="0.25" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:90 80 -120; to:-10 0 -120; dur:1800; loop:true; easing:easeInQuad; delay:400"></a-sphere>
<a-sphere position="60 90 -60" radius="0.2" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:60 90 -60; to:-40 10 -60; dur:1300; loop:true; easing:easeInQuad; delay:600"></a-sphere>
<a-sphere position="80 70 -140" radius="0.22" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:80 70 -140; to:-20 -10 -140; dur:1600; loop:true; easing:easeInQuad; delay:800"></a-sphere>
<a-sphere position="100 85 -90" radius="0.18" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:100 85 -90; to:-0 5 -90; dur:1100; loop:true; easing:easeInQuad; delay:1000"></a-sphere>
<a-sphere position="40 75 -110" radius="0.23" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:40 75 -110; to:-60 -5 -110; dur:1400; loop:true; easing:easeInQuad; delay:150"></a-sphere>
<a-sphere position="110 95 -70" radius="0.17" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:110 95 -70; to:10 15 -70; dur:1700; loop:true; easing:easeInQuad; delay:350"></a-sphere>
<a-sphere position="55 65 -130" radius="0.21" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:55 65 -130; to:-45 -15 -130; dur:1250; loop:true; easing:easeInQuad; delay:550"></a-sphere>
<a-sphere position="75 100 -50" radius="0.19" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:75 100 -50; to:-25 20 -50; dur:1950; loop:true; easing:easeInQuad; delay:750"></a-sphere>
<a-sphere position="95 78 -100" radius="0.24" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:95 78 -100; to:-5 -2 -100; dur:1350; loop:true; easing:easeInQuad; delay:900"></a-sphere>
<a-sphere position="45 88 -75" radius="0.16" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:45 88 -75; to:-55 8 -75; dur:1550; loop:true; easing:easeInQuad; delay:100"></a-sphere>
<a-sphere position="85 72 -115" radius="0.2" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:85 72 -115; to:-15 -8 -115; dur:1150; loop:true; easing:easeInQuad; delay:300"></a-sphere>
<a-sphere position="65 92 -85" radius="0.26" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:65 92 -85; to:-35 12 -85; dur:1800; loop:true; easing:easeInQuad; delay:500"></a-sphere>
<a-sphere position="105 68 -95" radius="0.14" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:105 68 -95; to:5 -12 -95; dur:1450; loop:true; easing:easeInQuad; delay:700"></a-sphere>
<a-sphere position="35 82 -65" radius="0.22" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:35 82 -65; to:-65 2 -65; dur:1650; loop:true; easing:easeInQuad; delay:1100"></a-sphere>
<a-sphere position="115 88 -105" radius="0.18" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:115 88 -105; to:15 8 -105; dur:1300; loop:true; easing:easeInQuad; delay:1300"></a-sphere>
<a-sphere position="25 96 -55" radius="0.2" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:25 96 -55; to:-75 16 -55; dur:1100; loop:true; easing:easeInQuad; delay:450"></a-sphere>
<a-sphere position="120 74 -125" radius="0.15" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:120 74 -125; to:20 -6 -125; dur:1750; loop:true; easing:easeInQuad; delay:650"></a-sphere>
<a-sphere position="50 60 -45" radius="0.23" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:50 60 -45; to:-50 -20 -45; dur:1200; loop:true; easing:easeInQuad; delay:850"></a-sphere>
<a-sphere position="78 84 -135" radius="0.17" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:78 84 -135; to:-22 4 -135; dur:1600; loop:true; easing:easeInQuad; delay:1200"></a-sphere>
<a-sphere position="42 76 -88" radius="0.21" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:42 76 -88; to:-58 -4 -88; dur:1400; loop:true; easing:easeInQuad; delay:280"></a-sphere>
<a-sphere position="98 90 -62" radius="0.19" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:98 90 -62; to:-2 10 -62; dur:1850; loop:true; easing:easeInQuad; delay:480"></a-sphere>
<a-sphere position="62 66 -118" radius="0.25" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:62 66 -118; to:-38 -14 -118; dur:1050; loop:true; easing:easeInQuad; delay:680"></a-sphere>
<a-sphere position="88 94 -78" radius="0.16" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:88 94 -78; to:-12 14 -78; dur:1500; loop:true; easing:easeInQuad; delay:880"></a-sphere>
<a-sphere position="30 70 -108" radius="0.22" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:30 70 -108; to:-70 -10 -108; dur:1250; loop:true; easing:easeInQuad; delay:1080"></a-sphere>
<a-sphere position="108 80 -48" radius="0.18" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:108 80 -48; to:8 0 -48; dur:1700; loop:true; easing:easeInQuad; delay:180"></a-sphere>
<a-sphere position="52 98 -98" radius="0.2" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:52 98 -98; to:-48 18 -98; dur:1350; loop:true; easing:easeInQuad; delay:380"></a-sphere>
<a-sphere position="72 62 -68" radius="0.24" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:72 62 -68; to:-28 -18 -68; dur:1600; loop:true; easing:easeInQuad; delay:580"></a-sphere>
<a-sphere position="118 86 -88" radius="0.14" color="#ffffff" material="shader:flat;emissive:#ffffff" animation="property:position; from:118 86 -88; to:18 6 -88; dur:1150; loop:true; easing:easeInQuad; delay:780"></a-sphere>

    <!-- 云朵 1 — 左侧远景，纯白，慢速 -->
    <a-entity cloud="color:#ddeeff;opacity:0.78"
      position="-120 45 -200"
      scale="3 2.2 3"
      animation="property:position; from:-120 45 -200; to:180 45 -200; dur:70000; loop:true; easing:linear">
    </a-entity>

    <!-- 云朵 2 — 右侧中景，偏蓝 -->
    <a-entity cloud="color:#ffffff;opacity:0.72"
      position="160 36 -140"
      scale="2.4 1.9 2.4"
      animation="property:position; from:160 36 -140; to:-160 36 -140; dur:85000; loop:true; easing:linear">
    </a-entity>

    <!-- 云朵 3 — 高空，大团，冰蓝 -->
    <a-entity cloud="color:#c8dff8;opacity:0.58"
      position="0 72 -300"
      scale="4.5 2.2 4.5"
      animation="property:position; from:0 72 -300; to:300 72 -300; dur:110000; loop:true; easing:linear">
    </a-entity>

    <!-- 云朵 4 — 近景偏低，奶白 -->
    <a-entity cloud="color:#eef4ff;opacity:0.88"
      position="-90 26 -70"
      scale="1.9 1.6 1.9"
      animation="property:position; from:-90 26 -70; to:220 26 -70; dur:55000; loop:true; easing:linear">
    </a-entity>

    <!-- 云朵 5 — 中高层，反向漂移 -->
    <a-entity cloud="color:#d8ecff;opacity:0.65"
      position="200 55 -240"
      scale="3.8 2 3.8"
      animation="property:position; from:200 55 -240; to:-200 55 -240; dur:95000; loop:true; easing:linear">
    </a-entity>

    <!-- 云朵 6 — 低层薄云，极慢 -->
    <a-entity cloud="color:#f0f8ff;opacity:0.5"
      position="80 20 -90"
      scale="2.8 1.4 2.8"
      animation="property:position; from:80 20 -90; to:-250 20 -90; dur:120000; loop:true; easing:linear">
    </a-entity>

    <!-- SLOT 1 -->
    <a-entity id="slot-1" position="310 -5 -50" scale="10 10 10" material="side:double">
      <a-gltf-model src="./yj.glb"></a-gltf-model>
    </a-entity>

    <!-- SLOT 2 -->
    <a-entity id="slot-2" position="100 0.3 -5" scale="4 4 4" material="side:double">
      <a-gltf-model src="./yj 1.glb"></a-gltf-model>
    </a-entity>

    <!-- SLOT 3 -->
    <a-entity id="slot-3" position="89 0 -12" scale="4 4 4" material="side:double">
      <a-gltf-model src="./yj 2.glb"></a-gltf-model>
    </a-entity>

    <!-- SLOT 4 -->
    <a-entity id="slot-4" position="150 0 -12" scale="4 4 4" material="side:double">
      <a-gltf-model src="./yj 3.glb"></a-gltf-model>
    </a-entity>

    <a-light type="ambient" intensity="2"></a-light>
    <a-light type="directional" intensity="2" position="0 10 10"></a-light>

    <a-entity camera="far: 900000; near:0.05" look-controls wasd-controls position="0 1.6 4"></a-entity>

  </a-scene>

  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const scene = document.querySelector('a-scene');
    const colors = ['#ffffff', '#cceeff', '#ffeedd', '#ddeeff'];
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('a-sphere');
      const x = (Math.random() - 0.5) * 200;
      const y = Math.random() * 60 + 20;
      const z = (Math.random() - 0.5) * 200;
      const radius = Math.random() * 0.15 + 0.05;
      const color = colors[Math.floor(Math.random() * colors.length)];
      const dur = Math.floor(Math.random() * 1500) + 500;
      star.setAttribute('position', `${x} ${y} ${z}`);
      star.setAttribute('radius', radius);
      star.setAttribute('material', `shader:flat;color:${color};emissive:${color};transparent:true;opacity:1`);
      star.setAttribute('animation', `property:material.opacity;from:1;to:0.1;dir:alternate;dur:${dur};loop:true;easing:easeInOutSine`);
      scene.appendChild(star);
    }
  });
</script>

</body>
</html>
